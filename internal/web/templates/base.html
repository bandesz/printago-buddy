{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printago Buddy</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f1f5f9;
            display: flex;
            min-height: 100vh;
            color: #1e293b;
        }
        nav {
            width: 220px;
            background: #1e293b;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }
        .nav-brand {
            color: #94a3b8;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 0 16px 16px;
            border-bottom: 1px solid #334155;
            margin-bottom: 8px;
        }
        nav a {
            display: block;
            color: #94a3b8;
            text-decoration: none;
            padding: 9px 16px;
            font-size: 14px;
            margin: 2px 8px;
            border-radius: 6px;
        }
        nav a:hover { background: #334155; color: #e2e8f0; }
        nav a.active { background: #2563eb; color: #fff; }
        main { flex: 1; padding: 28px 32px; overflow: auto; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand">Printago Buddy</div>
        <a href="/queue"{{if eq .Page "queue"}} class="active"{{end}}>Print Queue</a>
    </nav>
    <main>
        {{block "content" .}}{{end}}
    </main>
</body>
</html>
{{end}}
